# Refusal-probing config: replicating SAE4Safety methodology on Gemma 2 9B IT.
#
# Strategy: replicate SAE4Safety as closely as possible, then extend with:
#   - SAE features (their main gap — they only use dense probes)
#   - text baselines (never tested by them)
#   - cipher transfer testing (they do this, we replicate + extend)
#
# Dataset: AdvBench (520 harmful) + Alpaca (520 benign) — same as SAE4Safety.
# Split: 120 train / 40 val / 880 test (SAE4Safety uses 160/880; we carve out
#         40 for val to support threshold selection at TPR@1%FPR).
# Label: refusal (1) vs compliance (0) — assigned by LLM-as-judge on responses.
#
# Key difference from main.yaml: the probe target is *refusal behaviour*,
# not *input harmfulness*. Labels are identical on plain text (harmful→refuse,
# benign→comply), but should transfer better to obfuscated inputs.

seed: 42

model:
  name: "google/gemma-2-9b-it"
  dtype: "bfloat16"

data:
  dataset: "advbench_alpaca"
  advbench_path: "data/raw/advbench/harmful_behaviors.csv"
  alpaca_path: "data/raw/alpaca/alpaca_data.json"
  n_harmful: 520
  n_benign: 520
  # Absolute train/val/test counts (must sum to n_harmful + n_benign = 1040).
  # Matches SAE4Safety's 160-train / 880-test intent with a 40-example val split.
  train_size: 120
  val_size: 40
  test_size: 880

generation:
  max_new_tokens: 512
  temperature: 0.0  # greedy decoding for reproducibility
  batch_size: 8
  checkpoint_every: 100  # write partial JSONL every N examples

judge:
  model: "self"  # use same model; validate manually (~100 examples)
  max_new_tokens: 64
  temperature: 0.0
  batch_size: 8

features:
  # Same layer sweep as main experiment to allow direct comparison.
  # Gemma Scope IT SAE layers: 9, 20, 31.
  layers: [9, 15, 20, 25, 31, 36, 41]
  token_position: "last"  # last token of formatted prompt, matching SAE4Safety
  batch_size: 8
  max_length: 512

probe:
  model: "logistic_regression"
  # SAE4Safety uses L1 regularisation with penalty=0.002 (C=500 in sklearn).
  penalty: "l1"
  C: 500  # kept for backwards compatibility with transfer eval scripts
  c_values: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0, 500.0]
  max_iter: 1000
  cv_folds: 5

baseline:
  model: "tfidf_lr"
  max_features: 10000
  C: 1.0

eval:
  primary_metric: "tpr_at_fpr"
  target_fpr: 0.01
  secondary_metric: "roc_auc"

# SAE configuration — Gemma Scope IT residual stream SAEs.
# Same release/variant as main experiment for consistent encoding.
sae:
  layers: [9, 20, 31]
  width: 16384
  variant: "average_l0_14"
  release: "gemma-scope-9b-it-res"
