# Refusal-probing config: larger training set variant.
#
# Same as refusal.yaml but with 700 train / 100 val / 240 test split.
# Rationale: 120-train is catastrophically underdetermined for 16k-dim SAE
# features (137:1 feature-to-sample ratio). This config trades a smaller
# test set for a more plausible training regime.
#
# Use alongside refusal.yaml to show the effect of training set size.
# Full pipeline re-run required (GPU extraction, then CPU probe training).

seed: 42

model:
  name: "google/gemma-2-9b-it"
  dtype: "bfloat16"

data:
  dataset: "advbench_alpaca"
  advbench_path: "data/raw/advbench/harmful_behaviors.csv"
  alpaca_path: "data/raw/alpaca/alpaca_data.json"
  n_harmful: 520
  n_benign: 520
  # 700 train / 100 val / 240 test (must sum to 1040).
  train_size: 700
  val_size: 100
  test_size: 240

generation:
  max_new_tokens: 512
  temperature: 0.0  # greedy decoding for reproducibility
  batch_size: 8
  checkpoint_every: 100  # write partial JSONL every N examples

judge:
  model: "self"  # use same model; validate manually (~100 examples)
  max_new_tokens: 64
  temperature: 0.0
  batch_size: 8

features:
  layers: [9, 15, 20, 25, 31, 36, 41]
  token_position: "last"
  batch_size: 8
  max_length: 512

probe:
  model: "logistic_regression"
  penalty: "l1"
  C: 500  # kept for backwards compatibility with transfer eval scripts
  c_values: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0, 500.0]
  max_iter: 1000
  cv_folds: 5

baseline:
  model: "tfidf_lr"
  max_features: 10000
  C: 1.0

eval:
  primary_metric: "tpr_at_fpr"
  target_fpr: 0.01
  secondary_metric: "roc_auc"

sae:
  layers: [9, 20, 31]
  width: 16384
  variant: "average_l0_14"
  release: "gemma-scope-9b-it-res"
