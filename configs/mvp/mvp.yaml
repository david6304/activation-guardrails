# MVP experiment config
# Compare text-only (TF-IDF + LR) vs activation-based (linear probe) guardrails
# for harmful-intent detection on Qwen2.5-7B-Instruct.

seed: 42

model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  dtype: "float16"

data:
  harmful_source: "data/raw/harmbench/harmbench.jsonl"
  benign_source: "data/raw/xstest/xstest.jsonl"
  benign_label: "safe"
  n_harmful: 200
  n_benign: 250
  splits:
    train: 0.70
    val: 0.15
    test: 0.15

features:
  layers: [8, 16, 24, 32]
  token_position: "last"  # last token of chat-template-formatted prompt
  batch_size: 32
  max_length: 512

probe:
  model: "logistic_regression"
  C: 1.0
  max_iter: 1000

baseline:
  model: "tfidf_lr"
  max_features: 10000
  C: 1.0

eval:
  primary_metric: "tpr_at_fpr"
  target_fpr: 0.01
  secondary_metric: "roc_auc"
